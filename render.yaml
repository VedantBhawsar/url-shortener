services:
  - type: web
    name: url-shortener-api
    runtime: node
    plan: standard
    buildCommand: cd apps/api && bun install && bun run build
    startCommand: cd apps/api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PREMIUM_PRICE_ID
        sync: false
      - key: CORS_ORIGIN
        value: "your-frontend-url.com"
      - key: TRUST_PROXY
        value: "1"
